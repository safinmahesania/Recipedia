name: recipedia
description: Find recipes from the ingredients you already have.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # backend
  supabase_flutter: ^2.5.0

  # state / navigation
  get: ^4.6.5

  # media
  cached_network_image: ^3.2.3
  image_picker: ^1.2.3

  # sharing (FR11)
  share_plus: ^13.2.1

  # NOTE: add when the scan model ships (C5 — on-device TFLite)
  # tflite_flutter: ^0.10.4
  #
  # NOTE: add when push notifications are implemented (FR6, P1)
  # firebase_core: ^2.8.0
  # firebase_messaging: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Uncomment when the trained model is added:
  # assets:
